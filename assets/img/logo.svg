<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <defs>
    <style>
      .logo-main { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 26px; font-weight: 600; fill: #1A1A1A; letter-spacing: 0.03em; }
      .logo-accent { fill: #5B7F5E; }
      .logo-line { stroke: #5B7F5E; stroke-width: 1.2; fill: none; }
    </style>
  </defs>
  <!-- Minimal house icon -->
  <path class="logo-line" d="M10 28 L22 16 L34 28" stroke-linecap="round" stroke-linejoin="round"/>
  <line class="logo-line" x1="14" y1="28" x2="14" y2="36"/>
  <line class="logo-line" x1="30" y1="28" x2="30" y2="36"/>
  <line class="logo-line" x1="14" y1="36" x2="30" y2="36"/>
  <rect class="logo-line" x="20" y="30" width="4" height="6" rx="0.5"/>
  <!-- Text -->
  <text x="42" y="33" class="logo-main">Aoki <tspan class="logo-accent">Estate</tspan></text>
</svg>
